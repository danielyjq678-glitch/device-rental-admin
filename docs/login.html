<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商家后台 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }
    .login-box {
      width: 400px; background: #fff; border-radius: 16px;
      padding: 48px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .login-title { font-size: 28px; font-weight: bold; color: #333; text-align: center; margin-bottom: 8px; }
    .login-subtitle { font-size: 14px; color: #999; text-align: center; margin-bottom: 36px; }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 12px 16px; border: 1px solid #d9d9d9;
      border-radius: 8px; font-size: 15px; outline: none; transition: border-color .3s;
    }
    .form-group input:focus { border-color: #667eea; }
    .login-btn {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; border: none; border-radius: 8px; font-size: 16px;
      font-weight: 500; cursor: pointer; transition: opacity .3s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { color: #ff4d4f; font-size: 13px; text-align: center; margin-bottom: 16px; display: none; }
    .hint { font-size: 12px; color: #bbb; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 class="login-title">商家管理后台</h1>
    <p class="login-subtitle">数码设备租赁平台</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="username" placeholder="请输入用户名" />
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" />
    </div>
    <button class="login-btn" id="loginBtn" onclick="login()">登 录</button>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    const API_BASE = window.API_BASE || '';

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorEl = document.getElementById('errorMsg');
      const btn = document.getElementById('loginBtn');

      if (!username || !password) {
        errorEl.textContent = '请输入用户名和密码';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errorEl.style.display = 'none';

      try {
        const res = await fetch(API_BASE + '/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.code === 0) {
          localStorage.setItem('adminToken', data.data.token);
          localStorage.setItem('adminRole', data.data.role || 'admin');
          localStorage.setItem('adminNickname', data.data.nickname);
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = data.msg;
          errorEl.style.display = 'block';
        }
      } catch (err) {
        errorEl.textContent = '网络请求失败，请确认后端服务已启动';
        errorEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    // 回车登录
    document.getElementById('password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });
  </script>
</body>
</html>
